{% extends "base.html" %}

{% block title %}Messages - LiTree Social{% endblock %}

{% block content %}
<div style="display: grid; grid-template-columns: 300px 1fr; gap: 0; height: calc(100vh - 100px); background: var(--bg-secondary); border-radius: var(--border-radius); overflow: hidden;">
  <!-- Conversations List -->
  <div style="border-right: 1px solid var(--border-color); display: flex; flex-direction: column;">
    <div style="padding: 20px; border-bottom: 1px solid var(--border-color);">
      <h2 style="font-size: 1.3rem;">Messages</h2>
    </div>
    <div style="flex: 1; overflow-y: auto;" id="conversationsList">
      <div class="loading" style="padding: 40px;">Loading conversations...</div>
    </div>
  </div>
  
  <!-- Chat Area -->
  <div style="display: flex; flex-direction: column;" id="chatArea">
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
      <div style="text-align: center;">
        <p style="font-size: 4rem; margin-bottom: 20px;">💬</p>
        <h3>Select a conversation</h3>
        <p style="margin-top: 10px;">Choose a friend to start messaging</p>
        <button class="post-action-btn" style="margin-top: 20px;" onclick="askAssistant('How do I find friends to message?')">
          <span>🤖</span> Ask LitBit
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let currentConversation = null;
  
  document.addEventListener('DOMContentLoaded', () => {
    loadConversations();
    
    // Check for ?to= parameter
    const params = new URLSearchParams(window.location.search);
    const toUserId = params.get('to');
    if (toUserId) {
      openConversation(toUserId);
    }
  });
  
  async function loadConversations() {
    // This would load from /api/conversations
    const container = document.getElementById('conversationsList');
    
    // Mock data for now
    container.innerHTML = `
      <div class="conversation-item" onclick="openConversation(2)" style="display: flex; align-items: center; gap: 12px; padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background 0.2s;">
        <div style="position: relative;">
          <img src="/static/default-avatar.png" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover;">
          <span style="position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background: var(--success); border-radius: 50%; border: 2px solid var(--bg-secondary);"></span>
        </div>
        <div style="flex: 1; overflow: hidden;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600;">Demo User</span>
            <span style="font-size: 0.8rem; color: var(--text-muted);">2m</span>
          </div>
          <p style="color: var(--text-muted); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Hey! How are you?</p>
        </div>
      </div>
    `;
  }
  
  function openConversation(userId) {
    currentConversation = userId;
    
    const chatArea = document.getElementById('chatArea');
    chatArea.innerHTML = `
      <!-- Chat Header -->
      <div style="padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px;">
        <img src="/static/default-avatar.png" style="width: 40px; height: 40px; border-radius: 50%;">
        <div>
          <div style="font-weight: 600;">Demo User</div>
          <div style="font-size: 0.85rem; color: var(--success);">● Online</div>
        </div>
      </div>
      
      <!-- Messages -->
      <div style="flex: 1; overflow-y: auto; padding: 20px;" id="messagesList">
        <div style="text-align: center; color: var(--text-muted); padding: 40px;">
          <p>Start of conversation</p>
        </div>
      </div>
      
      <!-- Input -->
      <div style="padding: 15px 20px; border-top: 1px solid var(--border-color); display: flex; gap: 10px;">
        <input type="text" id="messageInput" placeholder="Type a message..." 
               style="flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 20px; background: var(--bg-tertiary); color: white; outline: none;"
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" class="post-submit-btn">Send</button>
      </div>
    `;
    
    document.getElementById('messageInput').focus();
    
    // Join room for this conversation
    if (socket) {
      socket.emit('join_conversation', { user_id: userId });
    }
  }
  
  function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    
    if (!content || !currentConversation) return;
    
    // Add to UI immediately
    addMessageToUI('outgoing', content);
    input.value = '';
    
    // Send via socket
    if (socket) {
      socket.emit('send_message', {
        recipient_id: currentConversation,
        content: content
      });
    }
  }
  
  function addMessageToUI(type, content) {
    const container = document.getElementById('messagesList');
    const div = document.createElement('div');
    div.style.cssText = type === 'outgoing' 
      ? 'display: flex; justify-content: flex-end; margin-bottom: 15px;'
      : 'display: flex; margin-bottom: 15px;';
    
    div.innerHTML = `
      <div style="max-width: 70%; padding: 12px 16px; border-radius: 18px; ${
        type === 'outgoing' 
          ? 'background: linear-gradient(135deg, var(--primary), var(--secondary)); border-bottom-right-radius: 5px;'
          : 'background: var(--bg-tertiary); border-bottom-left-radius: 5px;'
      }">
        ${content}
      </div>
    `;
    
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }
  
  // Listen for incoming messages
  socket.on('new_message', (data) => {
    if (currentConversation === data.sender_id) {
      addMessageToUI('incoming', data.content);
    } else {
      showToast(`New message from ${data.sender_name}`);
    }
  });
</script>
{% endblock %}
