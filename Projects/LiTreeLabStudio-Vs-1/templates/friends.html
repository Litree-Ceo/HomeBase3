{% extends "base.html" %}

{% block title %}Friends - LiTree Social{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
  <!-- Search -->
  <div style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 20px; margin-bottom: 20px;">
    <h2 style="margin-bottom: 15px;">Find Friends</h2>
    <div style="display: flex; gap: 10px;">
      <input type="text" id="friendSearch" placeholder="Search by username or name..."
             style="flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-tertiary); color: white;"
             oninput="searchUsers(this.value)">
      <button class="post-submit-btn" onclick="askAssistant('How do I find people to connect with?')">
        <span>🤖</span> Ask LitBit
      </button>
    </div>
    <div id="searchResults" style="margin-top: 15px;"></div>
  </div>
  
  <!-- Friends List -->
  <div style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 20px;">
    <h2 style="margin-bottom: 20px;">Your Friends</h2>
    <div id="friendsList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;">
      <div class="loading" style="grid-column: 1 / -1; text-align: center; padding: 40px;">Loading friends...</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    loadFriends();
  });
  
  async function loadFriends() {
    try {
      const response = await fetch('/api/users/friends');
      const data = await response.json();
      
      const container = document.getElementById('friendsList');
      
      if (data.friends.length === 0) {
        container.innerHTML = `
          <div style="grid-column: 1 / -1; text-align: center; padding: 60px 40px;">
            <p style="font-size: 4rem; margin-bottom: 20px;">👥</p>
            <h3>No friends yet</h3>
            <p style="color: var(--text-muted); margin-top: 10px;">
              Search for people above or ask LitBit for suggestions!
            </p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = data.friends.map(f => `
        <div style="background: var(--bg-tertiary); border-radius: 12px; padding: 20px; text-align: center;">
          <img src="${f.avatar_url}" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px;">
          <h3 style="margin-bottom: 5px;">${f.display_name}</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">@${f.username}</p>
          <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="/profile/${f.username}" class="post-action-btn" style="text-decoration: none;">View Profile</a>
            <a href="/messages?to=${f.id}" class="post-submit-btn" style="padding: 8px 16px; text-decoration: none;">Message</a>
          </div>
        </div>
      `).join('');
      
    } catch (err) {
      console.error('Failed to load friends:', err);
    }
  }
  
  let searchTimeout;
  async function searchUsers(query) {
    clearTimeout(searchTimeout);
    
    if (query.length < 2) {
      document.getElementById('searchResults').innerHTML = '';
      return;
    }
    
    searchTimeout = setTimeout(async () => {
      try {
        const response = await fetch(`/api/users/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();
        
        const container = document.getElementById('searchResults');
        
        if (data.users.length === 0) {
          container.innerHTML = '<p style="color: var(--text-muted); padding: 20px;">No users found</p>';
          return;
        }
        
        container.innerHTML = `
          <div style="background: var(--bg-tertiary); border-radius: 12px; overflow: hidden;">
            ${data.users.map(u => `
              <div style="display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid var(--border-color);">
                <img src="${u.avatar_url}" style="width: 48px; height: 48px; border-radius: 50%;">
                <div style="flex: 1;">
                  <div style="font-weight: 600;">${u.display_name}</div>
                  <div style="color: var(--text-muted); font-size: 0.9rem;">@${u.username}</div>
                </div>
                ${u.friendship_status === 'accepted' 
                  ? '<span style="color: var(--success);">✓ Friends</span>'
                  : u.friendship_status === 'pending'
                    ? '<span style="color: var(--warning);">⏳ Pending</span>'
                    : `<button class="post-submit-btn" style="padding: 8px 16px;" onclick="sendFriendRequest(${u.id}, this)">Add Friend</button>`
                }
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        console.error('Search failed:', err);
      }
    }, 300);
  }
  
  async function sendFriendRequest(userId, btn) {
    btn.disabled = true;
    btn.textContent = 'Sending...';
    
    try {
      const response = await fetch('/api/users/friends/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId })
      });
      
      const data = await response.json();
      
      if (data.success) {
        btn.textContent = '✓ Request Sent';
        btn.style.background = 'var(--success)';
        showToast('Friend request sent!');
      } else {
        btn.disabled = false;
        btn.textContent = 'Add Friend';
        showToast('Request failed');
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Add Friend';
      showToast('Network error');
    }
  }
</script>
{% endblock %}
